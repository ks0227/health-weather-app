<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>体調分析システム</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f7f8fa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .hero {
        padding: 80px 0 50px;
      }

      .hero h1 {
        font-size: 2.8rem;
        font-weight: 700;
      }

      .hero p {
        color: #6c757d;
        font-size: 1.05rem;
        line-height: 1.8;
      }

      .menu-card {
        border: none;

        border-radius: 18px;

        background: white;

        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);

        transition: 0.25s;

        text-decoration: none;

        color: #212529;

        display: block;

        height: 100%;
      }

      .menu-card:hover {
        transform: translateY(-6px);

        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);

        color: #198754;
      }

      .icon {
        width: 64px;

        height: 64px;

        border-radius: 16px;

        background: #eef8f4;

        color: #198754;

        display: flex;

        align-items: center;

        justify-content: center;

        font-size: 28px;
      }

      .card-title {
        font-weight: 600;

        margin-top: 20px;

        margin-bottom: 10px;
      }

      .footer {
        color: #999;

        font-size: 0.9rem;

        margin-top: 80px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="hero text-center">
        <span class="badge bg-success-subtle text-success px-3 py-2 mb-4">
          Health Analytics
        </span>

        <h1>体調 × 天気 分析システム</h1>

        <p class="mt-3">
          毎日の体調を記録し、<br />
          気温・湿度・気圧との関係を分析します。
        </p>
      </div>

      <div class="row g-4 justify-content-center">
        <div class="col-md-4">
          <a href="/log" class="menu-card p-4">
            <div class="icon">
              <i class="bi bi-pencil-square"></i>
            </div>

            <h5 class="card-title">体調を記録</h5>

            <p class="text-secondary mb-0">
              今日の体調・睡眠・症状を登録します。
            </p>
          </a>
        </div>

        <div class="col-md-4">
          <a href="/dashboard" class="menu-card p-4">
            <div class="icon">
              <i class="bi bi-bar-chart-line"></i>
            </div>

            <h5 class="card-title">ダッシュボード</h5>

            <p class="text-secondary mb-0">
              体調と天気の相関をグラフで確認できます。
            </p>
          </a>
        </div>

        <div class="col-md-4">
          <a href="/records" class="menu-card p-4">
            <div class="icon">
              <i class="bi bi-folder2-open"></i>
            </div>

            <h5 class="card-title">記録管理</h5>

            <p class="text-secondary mb-0">過去の記録を編集・削除します。</p>
          </a>
        </div>
      </div>

      <div class="footer text-center pb-5">
        30日以上のデータが蓄積されると、 より精度の高い分析が行えます。
      </div>
    </div>
  </body>
</html>
