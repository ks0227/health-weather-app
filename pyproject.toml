[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # 行の長さ（line-lengthで管理するため）
    "F401",  # 未使用import（Flaskの構造上発生しやすいため）
]

[tool.ruff.lint.per-file-ignores]
# テンプレートやルーターでの特殊なimportを許可
"routes/*.py" = ["F811"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]